<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro Exitoso - APE SENA</title>
<!-- Tailwind CSS v3 CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            senaGreen: '#39A900',
            senaDark: '#2b7d00',
            senaGray: '#f4f4f4',
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          },
        }
      }
    }
  </script>
<style data-purpose="custom-animations">
    @keyframes scaleIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-scale-in {
      animation: scaleIn 0.5s ease-out forwards;
    }
  </style>
</head>
<body class="bg-senaGray min-h-screen flex items-center justify-center p-4 font-sans overflow-hidden">
<!-- BEGIN: MainContainer -->
<main class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col items-center text-center p-12 md:p-20 animate-scale-in" data-purpose="success-card">
<!-- BEGIN: HeaderIcon -->
<section class="mb-10" data-purpose="status-icon">
<!-- Large Green Checkmark -->
<div class="w-40 h-40 bg-senaGreen rounded-full flex items-center justify-center shadow-lg mx-auto">
<svg class="h-24 w-24 text-white" fill="none" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</section>
<!-- END: HeaderIcon -->
<!-- BEGIN: SuccessMessage -->
<section class="mb-12" data-purpose="success-title">
<h1 class="text-5xl font-black text-gray-800 uppercase tracking-tight">
        ¡Registro Exitoso!
      </h1>
<p class="text-2xl text-gray-600 mt-4 font-medium">
        Su turno ha sido generado correctamente.
      </p>
</section>
<!-- END: SuccessMessage -->
<!-- BEGIN: TurnInfo -->
<section class="w-full bg-senaGreen/5 border-2 border-senaGreen/20 rounded-2xl py-10 px-8 mb-12" data-purpose="turn-display">
<div class="mb-2">
<span class="text-xl text-gray-500 font-semibold uppercase tracking-widest">Su Turno es:</span>
</div>
<div class="text-9xl font-black text-senaGreen mb-4" id="turn-number">
        N-042
      </div>
<div class="inline-block px-6 py-2 bg-senaGreen text-white rounded-full text-xl font-bold uppercase">
        Atención Normal
      </div>
</section>
<!-- END: TurnInfo -->
<!-- BEGIN: Instructions -->
<section class="mb-16 max-w-2xl" data-purpose="instructions">
<p class="text-2xl text-gray-700 leading-relaxed">
        Por favor, tome asiento en la <strong>zona de espera</strong>. 
        Esté atento a las pantallas para su llamado.
      </p>
</section>
<!-- END: Instructions -->
<!-- BEGIN: ActionButtons -->
<section class="w-full" data-purpose="navigation">
<button class="w-full py-8 bg-senaGreen hover:bg-senaDark text-white text-4xl font-black rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-widest focus:outline-none focus:ring-4 focus:ring-senaGreen/50" onclick="window.location.reload()" type="button">
        FINALIZAR
      </button>
</section>
<!-- END: ActionButtons -->
</main>
<!-- END: MainContainer -->
<!-- BEGIN: FooterBranding -->
<footer class="fixed bottom-8 w-full text-center pointer-events-none" data-purpose="branding">
<div class="flex items-center justify-center gap-4 opacity-50">
<div class="h-12 w-12 bg-senaGreen rounded-lg flex items-center justify-center">
<!-- Simplified SENA Logo Representation -->
<div class="w-8 h-8 border-4 border-white rounded-full relative">
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-1 h-4 bg-white rotate-45"></div>
</div>
</div>
</div>
<span class="text-xl font-bold text-gray-400">APE SENA - Oficina Virtual</span>
</div>
</footer>
<!-- END: FooterBranding -->
</body></html>
