<html lang="es"><head>

<title>SENA APE - Registro de Usuario</title>
<!-- Tailwind CSS v3 with plugins -->

<script>

            senaGray: '#f4f4f4',

<!-- Google Fonts for professional typography -->
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="layout-styles">
    body {
      background-color: #f9fafb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; /* Prevent scrolling for Kiosk feel */
    }
    .kiosk-shadow {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }
    .numpad-button {
      transition: all 0.1s ease;
      user-select: none;
    }
    .numpad-button:active {
      transform: scale(0.95);
      background-color: #e5e7eb;
    }
    .action-button:active {
      transform: scale(0.98);
    }
  </style>

<body class="font-sans text-gray-800">
<!-- BEGIN: MainHeader -->
<header class="bg-white border-b-4 border-senaGreen p-6 flex justify-between items-center shadow-md">
<div class="flex items-center gap-4">
<!-- Logo Placeholder -->
<img alt="SENA Logo" class="h-16" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC59EES4zoOG99Fj7_w1-boLEhIMfpzM9qykwlM_sqcEjdMxKHkE3N2v8OuxqHT34vCK0i3FVj0BVi8EfAiPpujEe5jJiTp8oyMARt592BteaEpK-Cq8Gl2LWt4wUChIKK4p4FPwbFWMtkh28QYMGfUjo-fNr3ssg7-wPyL80Kdj39f4Knb3aB2krNut0wMJgZAnTsEoBafxzzRPG5TlxET-d2rTVjmQLKPkJY55MAtq4Y2_q_9GaDgREmNU-Np1GmQcJ1FqGpu4sE2"/>
<div class="h-10 w-px bg-gray-300 mx-2"></div>
<h1 class="text-2xl font-bold text-gray-700 tracking-tight">Agencia Pública de Empleo</h1>
</div>
<div class="flex flex-col items-end">
<span class="text-xs uppercase font-bold text-gray-500 tracking-widest">Estrategia</span>
<span class="text-xl font-extrabold text-senaGreen">Cero Papel</span>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: ProgressBar -->
<nav class="bg-gray-100 py-6 px-12" data-purpose="registration-stepper">
<div class="max-w-6xl mx-auto">
<div class="flex items-center justify-between mb-4">
<span class="text-lg font-semibold text-senaGreen">Paso 2 de 2: Registro de Datos</span>
<span class="text-sm font-medium text-gray-500">Kiosk ID: 4K-SENA-01</span>
</div>
<div class="w-full bg-gray-300 h-4 rounded-full overflow-hidden">
<div class="bg-senaGreen h-full w-full transition-all duration-700 ease-in-out" style="width: 100%;"></div>
</div>
</div>
</nav>
<!-- END: ProgressBar -->
<!-- BEGIN: MainContent -->
<main class="flex-grow flex items-center justify-center p-8">
<div class="bg-white kiosk-shadow rounded-3xl w-full max-w-7xl h-full flex flex-col md:flex-row overflow-hidden border border-gray-100">
<!-- LEFT SECTION: Document Selection -->
<section class="w-full md:w-1/2 border-r border-gray-100 flex flex-col justify-center p-10" data-purpose="document-form">
<div class="bg-green-50 border border-green-200 rounded-2xl p-4 flex items-center justify-between mb-8 shadow-sm">
<div class="flex items-center gap-3">
<div class="bg-senaGreen text-white rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined text-2xl">check_circle</span>
</div>
<div>
<p class="text-xs font-bold text-green-700 uppercase tracking-wider">Población Seleccionada</p>
<h3 class="text-xl font-bold text-gray-800">Población Víctima</h3>
</div>
</div>
<div class="bg-white border border-green-200 px-3 py-1 rounded-full flex items-center gap-1">
<span class="material-symbols-outlined text-senaGreen text-lg">verified</span>
<span class="text-sm font-bold text-senaGreen uppercase">Verificado</span>
</div>
</div><h2 class="text-3xl font-bold mb-8 text-gray-800">Identificación</h2>
<div class="space-y-6">
<div data-purpose="document-type-container">
<label class="block text-sm font-bold text-gray-500 uppercase mb-3">Tipo de Documento</label>
<div class="grid grid-cols-2 gap-2">
<button class="flex items-center justify-center border-2 border-senaGreen bg-green-50 rounded-2xl text-senaGreen font-bold text-xl hover:bg-green-100 transition-colors p-4">
                C.C.
              </button>
<button class="flex items-center justify-center border-2 border-gray-200 rounded-2xl text-gray-500 font-bold text-xl hover:border-senaGreen hover:text-senaGreen transition-colors p-4">
                T.I.
              </button>
<button class="flex items-center justify-center border-2 border-gray-200 rounded-2xl text-gray-500 font-bold text-xl hover:border-senaGreen hover:text-senaGreen transition-colors p-4">
                C.E.
              </button>
<button class="flex items-center justify-center border-2 border-gray-200 rounded-2xl text-gray-500 font-bold text-xl hover:border-senaGreen hover:text-senaGreen transition-colors p-4">
                PEP
              </button>
</div>
</div>
<div class="mt-8" data-purpose="document-number-container">
<label class="block text-sm font-bold text-gray-500 uppercase mb-3" for="doc-number">Número de Documento</label>
<input class="w-full font-bold tracking-widest text-center border-b-4 border-gray-200 focus:border-senaGreen outline-none transition-colors bg-gray-50 rounded-t-xl cursor-pointer p-6 text-3xl" id="doc-number" onclick="setActiveInput('doc-number')" placeholder="Ingrese el número" readonly="" type="text"/>
<p class="mt-4 text-gray-400 italic text-lg">Use el teclado numérico de la derecha para ingresar su número.</p>
</div><div class="mt-6" data-purpose="phone-number-container">
<label class="block text-sm font-bold text-gray-500 uppercase mb-3" for="phone-number">Número de Teléfono (Opcional)</label>
<input class="w-full p-6 text-3xl font-bold tracking-widest text-center border-b-4 border-gray-200 focus:border-senaGreen outline-none transition-colors bg-gray-50 rounded-t-xl cursor-pointer" id="phone-number" onclick="setActiveInput('phone-number')" placeholder="Ingrese su teléfono" readonly="" type="text"/>
</div>
</div>
</section>
<!-- RIGHT SECTION: Numerical Keypad -->
<section class="w-full md:w-1/2 bg-gray-50 p-12 flex flex-col justify-center items-center" data-purpose="numpad-container">
<div class="grid grid-cols-3 gap-6 w-full max-w-md">
<!-- Numbers 1-9 -->
<button class="numpad-button bg-white text-gray-700 text-4xl font-bold py-8 rounded-2xl shadow-sm border border-gray-200 hover:bg-gray-100" onclick="appendNumber('1')">1</button>
<button class="numpad-button bg-white text-gray-700 text-4xl font-bold py-8 rounded-2xl shadow-sm border border-gray-200 hover:bg-gray-100" onclick="appendNumber('2')">2</button>
<button class="numpad-button bg-white text-gray-700 text-4xl font-bold py-8 rounded-2xl shadow-sm border border-gray-200 hover:bg-gray-100" onclick="appendNumber('3')">3</button>
<button class="numpad-button bg-white text-gray-700 text-4xl font-bold py-8 rounded-2xl shadow-sm border border-gray-200 hover:bg-gray-100" onclick="appendNumber('4')">4</button>
<button class="numpad-button bg-white text-gray-700 text-4xl font-bold py-8 rounded-2xl shadow-sm border border-gray-200 hover:bg-gray-100" onclick="appendNumber('5')">5</button>
<button class="numpad-button bg-white text-gray-700 text-4xl font-bold py-8 rounded-2xl shadow-sm border border-gray-200 hover:bg-gray-100" onclick="appendNumber('6')">6</button>
<button class="numpad-button bg-white text-gray-700 text-4xl font-bold py-8 rounded-2xl shadow-sm border border-gray-200 hover:bg-gray-100" onclick="appendNumber('7')">7</button>
<button class="numpad-button bg-white text-gray-700 text-4xl font-bold py-8 rounded-2xl shadow-sm border border-gray-200 hover:bg-gray-100" onclick="appendNumber('8')">8</button>
<button class="numpad-button bg-white text-gray-700 text-4xl font-bold py-8 rounded-2xl shadow-sm border border-gray-200 hover:bg-gray-100" onclick="appendNumber('9')">9</button>
<!-- Special Actions -->
<button class="numpad-button bg-red-100 text-red-600 text-xl font-bold py-8 rounded-2xl shadow-sm border border-red-200" onclick="clearAll()">LIMPIAR</button>
<button class="numpad-button bg-white text-gray-700 text-4xl font-bold py-8 rounded-2xl shadow-sm border border-gray-200" onclick="appendNumber('0')">0</button>
<button class="numpad-button bg-orange-100 text-orange-600 text-xl font-bold py-8 rounded-2xl shadow-sm border border-orange-200" onclick="backspace()">BORRAR</button>
</div>
</section>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: BottomNavigation -->
<footer class="p-8 bg-white border-t border-gray-200">
<div class="max-w-7xl mx-auto flex justify-between gap-8">
<button class="action-button flex-1 py-8 px-12 bg-gray-200 text-gray-600 rounded-2xl text-2xl font-bold flex items-center justify-center gap-4 hover:bg-gray-300 transition-all">
<svg class="h-8 w-8" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
        Volver
      </button>
<button class="action-button flex-[2] py-8 px-12 bg-senaGreen text-white rounded-2xl text-3xl font-bold flex items-center justify-center gap-4 hover:bg-senaDark transition-all shadow-lg shadow-green-200">
        Siguiente
        <svg class="h-10 w-10" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</button>
</div>
</footer>
<!-- END: BottomNavigation -->
<!-- BEGIN: JavaScriptInteractivity -->
<script data-purpose="numpad-logic">
    let activeInputId = 'doc-number';

    function setActiveInput(id) {
      activeInputId = id;
      // Optional: Add visual feedback for focus if needed, 
      // though the focus:border-senaGreen handles it if we call .focus()
      document.getElementById(id).focus();
    }

    function getActiveInput() {
      return document.getElementById(activeInputId);
    }

    function appendNumber(val) {
      const input = getActiveInput();
      const maxLength = activeInputId === 'phone-number' ? 10 : 15;
      if (input.value.length < maxLength) {
        input.value += val;
      }
    }

    function backspace() {
      const input = getActiveInput();
      input.value = input.value.slice(0, -1);
    }

    function clearAll() {
      const input = getActiveInput();
      input.value = '';
    }
  </script>
<!-- END: JavaScriptInteractivity -->
</body></html>
